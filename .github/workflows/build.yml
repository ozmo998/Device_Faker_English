name: Build Device Faker Module

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - "Cargo.*"
      - 'device_faker_cli/**'
      - 'module/**'
      - 'webui/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'src/**'
      - "Cargo.*"
      - 'device_faker_cli/**'
      - 'module/**'
      - 'webui/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r29
          add-to-path: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src
          toolchain: nightly
          targets: aarch64-linux-android
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json
          
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-multilib
          cargo install cargo-ndk --locked

      - name: Build device_faker
        run: |
          cargo run --package xtask -- build -r

      - name: Install UPX
        run: |
          sudo apt-get update
          sudo apt-get install -y upx

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: device_faker
          path: module/
      
      - name: Upload
        if: github.event_name == 'push'
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MESSAGE_THREAD_ID: ${{ secrets.MESSAGE_THREAD_ID }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MEDIA_JSON=$(python3 - <<'PY'
          import json
          import os
          import re

          def escape_md2(value: str) -> str:
              """Escape MarkdownV2 special characters in user-provided text."""
              value = value.replace("\\", "\\\\")
              return re.sub(r"([_*\[\]()~`>#+\-=|{}.!])", r"\\\1", value)

          commit_msg = escape_md2(os.environ.get("COMMIT_MSG", ""))
          author = escape_md2(os.environ.get("COMMIT_AUTHOR", ""))
          run_number = escape_md2(os.environ.get("RUN_NUMBER", ""))
          commit_url = os.environ.get("COMMIT_URL", "")
          workflow_url = os.environ.get("WORKFLOW_URL", "")

          # Only escape parentheses inside URLs for MarkdownV2 link syntax
          commit_url_escaped = commit_url.replace(")", "\\)")
          workflow_url_escaped = workflow_url.replace(")", "\\)")

          caption = (
              f"🚀 *Device\\_Faker Build \\#{run_number}*\n"
              f"📋 *Build Info:*\n"
              f"[Commit]({commit_url_escaped})\n"
              f"📝 *Commit Message:*\n"
              f"```\n{commit_msg}\n```\n"
              f"by `{author}`\n\n"
              f"🔗 [View Workflow]({workflow_url_escaped})"
          )

          media = [
              {
                  "type": "document",
                  "media": "attach://file",
                  "parse_mode": "MarkdownV2",
                  "caption": caption,
              }
          ]

          print(json.dumps(media))
          PY
          )

          curl -v "https://api.telegram.org/bot${BOT_TOKEN}/sendMediaGroup" \
            -F "chat_id=${CHAT_ID}" \
            -F "message_thread_id=${MESSAGE_THREAD_ID}" \
            -F "media=${MEDIA_JSON}" \
            -F "file=@output/device_faker-(release).zip"
